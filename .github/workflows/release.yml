name: Release

on:
  push:
    tags:
      - "v*"
  schedule:
    # Daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch/tag/SHA)"
        required: false
        default: "master"
      tag:
        description: "Release tag to publish assets to (for example: v4.14.6)"
        required: false

permissions:
  contents: write

jobs:
  verify-core:
    name: Verify Core Quality Gate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.tag == 'nightly')) && 'refs/heads/master' || inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        shell: bash
        run: python -m pip install uv

      - name: Run local PR gate checks
        shell: bash
        run: make pr-test-neo

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-24.04
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.tag == 'nightly')) && 'refs/heads/master' || inputs.ref || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            tag="nightly"
          elif [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="$(git describe --tags --abbrev=0)"
          fi
          if [ -z "$tag" ]; then
            echo "Failed to resolve tag." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.13.0'
          cache: "pnpm"
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard dist
        shell: bash
        run: |
          pnpm --dir dashboard install --frozen-lockfile
          pnpm --dir dashboard run build
          echo "${{ steps.tag.outputs.tag }}" > dashboard/dist/assets/version
          cd dashboard
          zip -r "AstrBot-${{ steps.tag.outputs.tag }}-dashboard.zip" dist
          cp "AstrBot-${{ steps.tag.outputs.tag }}-dashboard.zip" dist.zip

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v7
        with:
          name: Dashboard-${{ steps.tag.outputs.tag }}
          if-no-files-found: error
          path: |
            dashboard/AstrBot-${{ steps.tag.outputs.tag }}-dashboard.zip
            dashboard/dist.zip

      - name: Upload dashboard package to Cloudflare R2
        if: ${{ env.R2_ACCOUNT_ID != '' && env.R2_ACCESS_KEY_ID != '' && env.R2_SECRET_ACCESS_KEY != '' && steps.tag.outputs.tag != 'nightly' }}
        env:
          R2_BUCKET_NAME: "astrbot"
          R2_OBJECT_NAME: "astrbot-webui-latest.zip"
          VERSION_TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = $R2_ACCESS_KEY_ID
          secret_access_key = $R2_SECRET_ACCESS_KEY
          endpoint = https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          EOF

          cp "dashboard/AstrBot-${VERSION_TAG}-dashboard.zip" "dashboard/${R2_OBJECT_NAME}"
          rclone copy "dashboard/${R2_OBJECT_NAME}" "r2:${R2_BUCKET_NAME}" --progress
          cp "dashboard/AstrBot-${VERSION_TAG}-dashboard.zip" "dashboard/astrbot-webui-${VERSION_TAG}.zip"
          rclone copy "dashboard/astrbot-webui-${VERSION_TAG}.zip" "r2:${R2_BUCKET_NAME}" --progress

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - verify-core
      - build-dashboard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.tag == 'nightly')) && 'refs/heads/master' || inputs.ref || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            tag="nightly"
          elif [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="$(git describe --tags --abbrev=0)"
          fi
          if [ -z "$tag" ]; then
            echo "Failed to resolve tag." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Resolve release title
        id: release-meta
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if [ "$tag" = "nightly" ]; then
            short_sha="$(git rev-parse --short=8 HEAD)"
            base_version="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+(\.[0-9]+)*$' | head -n1)"
            if [ -z "$base_version" ]; then
              base_version="v0.0.0"
            fi
            title="${base_version}-nightly-${short_sha}"
          else
            title="$tag"
          fi
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Force-update nightly tag
        if: ${{ steps.tag.outputs.tag == 'nightly' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          current_sha="$(git rev-parse HEAD)"
          git tag -f nightly "${current_sha}"
          git push --force origin refs/tags/nightly

      - name: Download dashboard artifact
        uses: actions/download-artifact@v8
        with:
          name: Dashboard-${{ steps.tag.outputs.tag }}
          path: release-assets


      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if [ "$tag" = "nightly" ]; then
            note_file="$(mktemp)"
            base_tag="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
            if [ -z "$base_tag" ]; then
              echo "## What's Changed" > "$note_file"
              echo >> "$note_file"
              echo "- Nightly build from \`$(git rev-parse --short=8 HEAD)\`" >> "$note_file"
            else
              BASE_TAG="$base_tag" NOTE_FILE="$note_file" REPO="${{ github.repository }}" python3 - <<'PY'
          import os
          import subprocess
          from collections import defaultdict

          base_tag = os.environ["BASE_TAG"]
          note_file = os.environ["NOTE_FILE"]
          repo = os.environ["REPO"]

          result = subprocess.run(
              ["git", "log", "--no-merges", "--pretty=format:%h%x1f%s", f"{base_tag}..HEAD"],
              capture_output=True,
              text=True,
              check=True,
          )

          sections = defaultdict(list)

          def classify(subject: str) -> str:
              s = subject.lower().strip()
              if s.startswith("feat") or "新增" in subject:
                  return "新增"
              if s.startswith("fix") or "修复" in subject:
                  return "修复"
              if s.startswith("perf") or s.startswith("refactor") or "优化" in subject:
                  return "优化"
              return "其他"

          for line in result.stdout.splitlines():
              if not line.strip():
                  continue
              short_sha, subject = line.split("\x1f", 1)
              commit_link = f"https://github.com/{repo}/commit/{short_sha}"
              sections[classify(subject)].append(f"- {subject} ([`{short_sha}`]({commit_link}))")

          with open(note_file, "w", encoding="utf-8") as f:
              f.write("## What's Changed\n\n")
              f.write(f"- Baseline tag: `{base_tag}`\n")
              f.write(f"- Nightly commit: `{subprocess.check_output(['git', 'rev-parse', '--short=8', 'HEAD'], text=True).strip()}`\n\n")
              for title in ("新增", "修复", "优化", "其他"):
                  items = sections.get(title, [])
                  if not items:
                      continue
                  f.write(f"### {title}\n")
                  f.write("\n".join(items))
                  f.write("\n\n")
          PY
            fi
          else
            note_file="changelogs/${tag}.md"
            if [ ! -f "$note_file" ]; then
              note_file="$(mktemp)"
              echo "Release ${tag}" > "$note_file"
            fi
          fi
          echo "file=$note_file" >> "$GITHUB_OUTPUT"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          title="${{ steps.release-meta.outputs.title }}"
          if [ "$tag" = "nightly" ]; then
            pre_flag="--prerelease"
          else
            pre_flag=""
          fi
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$title" --notes-file "${{ steps.notes.outputs.file }}" $pre_flag
          elif [ "$tag" = "nightly" ]; then
            gh release edit "$tag" --title "$title" --notes-file "${{ steps.notes.outputs.file }}" --prerelease
          fi

      - name: Remove stale assets from release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          while IFS= read -r asset; do
            case "$asset" in
              AstrBot-*-dashboard.zip)
                gh release delete-asset "$tag" "$asset" -y || true
                ;;
            esac
          done < <(gh release view "$tag" --json assets --jq '.assets[].name')

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          gh release upload "$tag" release-assets/* --clobber

  publish-pypi:
    name: Publish PyPI
    if: ${{ github.event_name != 'schedule' && (github.event_name != 'workflow_dispatch' || inputs.tag != 'nightly') }}
    runs-on: ubuntu-24.04
    needs:
      - publish-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.tag == 'nightly')) && 'refs/heads/master' || inputs.ref || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            tag="nightly"
          elif [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="$(git describe --tags --abbrev=0)"
          fi
          if [ -z "$tag" ]; then
            echo "Failed to resolve tag." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download dashboard artifact
        uses: actions/download-artifact@v8
        with:
          name: Dashboard-${{ steps.tag.outputs.tag }}
          path: dashboard-artifact

      - name: Unpack dashboard dist into package tree
        shell: bash
        run: |
          mkdir -p astrbot/dashboard/dist
          unzip -q "dashboard-artifact/AstrBot-${{ steps.tag.outputs.tag }}-dashboard.zip" -d dashboard-artifact/unpacked
          cp -r dashboard-artifact/unpacked/dist/. astrbot/dashboard/dist/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        shell: bash
        run: python -m pip install uv

      - name: Build package
        shell: bash
        # Dashboard assets are already in astrbot/dashboard/dist/;
        # ASTRBOT_BUILD_DASHBOARD is intentionally unset so the hatch hook skips npm.
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        shell: bash
        run: uv publish
