name: AstrBot Dashboard CI

on:
  push:
    branches: [ "master" ]
    paths:
      - '.github/workflows/dashboard_ci.yml'
      - 'dashboard/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - '.github/workflows/dashboard_ci.yml'
      - 'dashboard/**'

jobs:
  build:
    if: github.repository == 'AstrBotDevs/AstrBot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node
        with:
          pnpm-version: 10.28.2
          node-version: '24.13.0'
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard dist
        uses: ./.github/actions/build-dashboard
        with:
          archive-name: dist.zip

      - name: Archive production artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist-without-markdown
          path: |
            dashboard/dist
            !dist/**/*.md

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: release-${{ github.sha }}
          owner: AstrBotDevs
          repo: astrbot-release-harbour
          body: "Automated release from commit ${{ github.sha }}"
          token: ${{ secrets.ASTRBOT_HARBOUR_TOKEN }}
          artifacts: "dashboard/dist.zip"
