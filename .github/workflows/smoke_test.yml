name: Smoke Test

on:
  push:
    branches:
      - master
    paths-ignore:
      - "README*.md"
      - "changelogs/**"
      - "dashboard/**"
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    name: Run smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'
          - os: ubuntu-latest
            python-version: '3.13'
          - os: ubuntu-latest
            python-version: '3.14'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install UV package manager
        run: |
          pip install uv

      - name: Install dependencies
        run: |
          uv sync
        timeout-minutes: 15

      - name: Run smoke tests
        run: uv run python scripts/smoke_startup_check.py
        timeout-minutes: 2
